<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Vivienda</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 85%; max-width: 350px; }
        button { background: #007bff; color: white; border: none; padding: 25px; font-size: 22px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: bold; }
        button:active { background: #0056b3; transform: scale(0.98); }
        #status { margin-top: 20px; font-weight: bold; color: #28a745; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Acceso Portal</h1>
        <button onclick="abrirYRefrescar()">ABRIR PORTAL</button>
        <div id="status">✓ Solicitud enviada</div>
    </div>

    <script>
        function abrirYRefrescar() {
            const btn = document.querySelector('button');
            const status = document.getElementById('status');
            
            // 1. La URL que confirmaste que devuelve isok:true (usando GET para máxima compatibilidad)
            const url = "https://shelly-91-eu.shelly.cloud/device/relay/control?id=D48AFC555D4C&auth_key=ZGY0NGR1aWQ03FA30F8718C1CAC608463590652E6FBB3A1287F2095B25495689DA9379ED25A523AE141503EEA91&turn=on";

            // 2. Abrimos la URL en una ventana nueva (acción humana directa = éxito seguro)
            const nuevaVentana = window.open(url, "_blank");

            // 3. UI Feedback
            btn.disabled = true;
            btn.innerText = "ABRIENDO...";
            status.style.display = "block";

            // 4. Cerramos la pestaña de Shelly tras 1.5 segundos para que no vean el JSON
            setTimeout(() => {
                if (nuevaVentana) nuevaVentana.close();
                btn.disabled = false;
                btn.innerText = "ABRIR PORTAL";
                status.style.display = "none";
            }, 1500);
        }
    </script>

</body>
</html>
