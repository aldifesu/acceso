<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Vivienda</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 85%; max-width: 380px; }
        button { 
            background: #007bff; color: white; border: none; padding: 25px; 
            font-size: 22px; border-radius: 15px; cursor: pointer; 
            width: 100%; font-weight: bold; transition: all 0.3s;
        }
        button:active { transform: scale(0.96); }
        button:disabled { background: #6c757d; cursor: not-allowed; }
        #status { margin-top: 20px; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Acceso Portal</h1>
        <button id="mainBtn" onclick="abrirPortal()">ABRIR PORTAL</button>
        <div id="status"></div>
    </div>

    <script>
        // 1. CONFIGURACIÓN (Pega aquí la URL de tu Worker de Cloudflare)
        const WORKER_URL = "https://nameless-cake-1ff4.rudefu.workers.dev";

        async function abrirPortal() {
            const urlParams = new URLSearchParams(window.location.search);
            const userKey = urlParams.get('key');
            const btn = document.getElementById('mainBtn');
            const status = document.getElementById('status');

            if (!userKey) {
                status.innerText = "Error: Falta llave de acceso";
                status.style.color = "#dc3545";
                return;
            }

            btn.disabled = true;
            btn.innerText = "PROCESANDO...";
            status.innerText = "Verificando llave...";
            status.style.color = "#666";

            try {
                // Llamamos al Worker (él se encarga de Shelly y de las claves secretas)
                const response = await fetch(`${WORKER_URL}/?key=${userKey}`);

                if (response.ok) {
                    status.innerText = "✓ PUERTA ABIERTA";
                    status.style.color = "#28a745";
                } else {
                    status.innerText = "Acceso Denegado o Caducado";
                    status.style.color = "#dc3545";
                }
            } catch (error) {
                status.innerText = "Error de conexión";
                status.style.color = "#dc3545";
            }

            // Resetear botón tras 5 segundos
            setTimeout(() => {
                btn.disabled = false;
                btn.innerText = "ABRIR PORTAL";
                status.innerText = "";
            }, 5000);
        }
    </script>
</body>
</html>
