<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Vivienda</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 85%; max-width: 350px; }
        button { background: #007bff; color: white; border: none; padding: 25px; font-size: 22px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: bold; }
        button:active { background: #0056b3; transform: scale(0.98); }
        #mensaje { margin-top: 20px; color: #28a745; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Acceso Portal</h1>
        
        <form action="https://shelly-91-eu.shelly.cloud/device/relay/control" method="POST" target="marco_oculto" onsubmit="mostrarMensaje()">
            <input type="hidden" name="id" value="D48AFC555D4C">
            <input type="hidden" name="auth_key" value="ZGY0NGR1aWQ03FA30F8718C1CAC608463590652E6FBB3A1287F2095B25495689DA9379ED25A523AE141503EEA61">
            <input type="hidden" name="turn" value="on">
            
            <button type="submit" id="btn">ABRIR PORTAL</button>
        </form>

        <div id="mensaje">✓ Solicitud enviada</div>
    </div>

    <iframe name="marco_oculto" id="marco_oculto" style="display:none;"></iframe>

    <script>
        function mostrarMensaje() {
            const btn = document.getElementById('btn');
            const msg = document.getElementById('mensaje');
            
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;
            msg.style.display = "block";

            // Pasados 5 segundos el botón vuelve a la normalidad
            setTimeout(() => {
                btn.innerText = "ABRIR PORTAL";
                btn.disabled = false;
                msg.style.display = "none";
            }, 5000);
        }
    </script>

</body>
</html>
